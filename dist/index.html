<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32-DQjEQYWa.png">

  <title>Frontend Mentor | Article preview component</title>


  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: 'Manrope', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-color: white;
    }

    .container{
      display: flex;
      line-height: 1.2;
      font-size: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      background-color: white;
      border: none;
      max-width: 730px;
    }

    .container > img {
      width: 40%;
      object-fit: cover;
      border-top-left-radius: 15px;
      border-bottom-left-radius: 15px;
    }

    .parent-div {
      width: 60%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content h1{
      font-size: 20px;
      color: #48556a;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .content p{
      font-size: 13px;
      color: #6d7f97;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .div3{
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .author{
      display: flex;
      flex-direction: column;
      gap: 3px;
      line-height: 1.1;
    }

    .author .name {
      font-weight: 700;
      color: #48556a;
      font-size: 14px;
    }

    .author .date {
      color: #9eafc2;
      font-size: 14px;
    }

    .div3 img{
      width: 40px;
      border-radius: 50%;
    }

    .share {
      background-color: #edf2f8;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
    }

    .share-tooltip {
      position: absolute;
      bottom: 160%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #48556a;
      padding: 12px 25px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .share-tooltip span {
      color: #9eafc2;
      letter-spacing: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .share-tooltip img {
      width: 18px;
      cursor: pointer;
    }

    .share-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 8px;
      border-style: solid;
      border-color: #48556a transparent transparent transparent;
    }

    .share-tooltip.active {
      opacity: 1;
      visibility: visible;
    }

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<main class="container">
  <img src="/assets/drawers-Dp_c42v-.jpg" alt="">

  <div class="parent-div">
      <div class="content">
        <h1>Shift the overall look and feel by adding these wonderful
          touches to furniture in your home</h1>

        <p>Ever been in a room and felt like something was missing? Perhaps
          it felt slightly bare and uninviting. I’ve got some simple tips
          to help you make any room feel complete.</p>

        <footer>
          <div class="div3">
            <img src="/assets/avatar-michelle-GPnPjUAe.jpg" alt="">
            <div class="author">
              <span class="name">Michelle Appleton</span>
              <span class="date">28 Jun 2020</span>
            </div>
          </div>
          <div class="share" id="shareBtn">
            <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='15'%20height='13'%3e%3cpath%20fill='%236E8098'%20d='M15%206.495L8.766.014V3.88H7.441C3.33%203.88%200%207.039%200%2010.936v2.049l.589-.612C2.59%2010.294%205.422%209.11%208.39%209.11h.375v3.867L15%206.495z'/%3e%3c/svg%3e" alt="Share Icon">

            <div class="share-tooltip" id="tooltip">
              <span>SHARE</span>
              <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='20'%20height='20'%3e%3cpath%20fill='%23FFF'%20d='M18.896%200H1.104C.494%200%200%20.494%200%201.104v17.793C0%2019.506.494%2020%201.104%2020h9.58v-7.745H8.076V9.237h2.606V7.01c0-2.583%201.578-3.99%203.883-3.99%201.104%200%202.052.082%202.329.119v2.7h-1.598c-1.254%200-1.496.597-1.496%201.47v1.928h2.989l-.39%203.018h-2.6V20h5.098c.608%200%201.102-.494%201.102-1.104V1.104C20%20.494%2019.506%200%2018.896%200z'/%3e%3c/svg%3e" alt="Facebook">
              <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='20'%20height='17'%3e%3cpath%20fill='%23FFF'%20d='M20%202.172a8.192%208.192%200%2001-2.357.646%204.11%204.11%200%20001.804-2.27%208.22%208.22%200%2001-2.605.996A4.096%204.096%200%200013.847.248c-2.65%200-4.596%202.472-3.998%205.037A11.648%2011.648%200%20011.392%201a4.109%204.109%200%20001.27%205.478%204.086%204.086%200%2001-1.858-.513c-.045%201.9%201.318%203.679%203.291%204.075a4.113%204.113%200%2001-1.853.07%204.106%204.106%200%20003.833%202.849A8.25%208.25%200%20010%2014.658a11.616%2011.616%200%20006.29%201.843c7.618%200%2011.922-6.434%2011.663-12.205A8.354%208.354%200%200020%202.172z'/%3e%3c/svg%3e" alt="Twitter">
              <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='20'%20height='20'%3e%3cpath%20fill='%23FFF'%20d='M10%200C4.478%200%200%204.477%200%2010c0%204.237%202.636%207.855%206.356%209.312-.088-.791-.167-2.005.035-2.868.182-.78%201.172-4.97%201.172-4.97s-.299-.6-.299-1.486c0-1.39.806-2.428%201.81-2.428.852%200%201.264.64%201.264%201.408%200%20.858-.545%202.14-.828%203.33-.236.995.5%201.807%201.48%201.807%201.778%200%203.144-1.874%203.144-4.58%200-2.393-1.72-4.068-4.177-4.068-2.845%200-4.515%202.135-4.515%204.34%200%20.859.331%201.781.745%202.281a.3.3%200%2001.069.288l-.278%201.133c-.044.183-.145.223-.335.134-1.249-.581-2.03-2.407-2.03-3.874%200-3.154%202.292-6.052%206.608-6.052%203.469%200%206.165%202.473%206.165%205.776%200%203.447-2.173%206.22-5.19%206.22-1.013%200-1.965-.525-2.291-1.148l-.623%202.378c-.226.869-.835%201.958-1.244%202.621.937.29%201.931.446%202.962.446%205.522%200%2010-4.477%2010-10S15.522%200%2010%200z'/%3e%3c/svg%3e" alt="Pinterest">
            </div>
          </div>
        </footer>
      </div>
  </div>

  </main>

<script>
  const shareBtn = document.getElementById("shareBtn");
  const tooltip = document.getElementById("tooltip");

  shareBtn.addEventListener("click", () => {
    tooltip.classList.toggle("active");
  })
</script>
</body>
</html>
