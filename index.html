<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Article preview component</title>


  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: 'Manrope', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-color: white;
    }

    .container{
      display: flex;
      line-height: 1.2;
      font-size: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      background-color: white;
      border: none;
      max-width: 730px;
    }

    .container > img {
      width: 40%;
      object-fit: cover;
      border-top-left-radius: 15px;
      border-bottom-left-radius: 15px;
    }

    .parent-div {
      width: 60%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content h1{
      font-size: 20px;
      color: #48556a;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .content p{
      font-size: 13px;
      color: #6d7f97;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .div3{
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .author{
      display: flex;
      flex-direction: column;
      gap: 3px;
      line-height: 1.1;
    }

    .author .name {
      font-weight: 700;
      color: #48556a;
      font-size: 14px;
    }

    .author .date {
      color: #9eafc2;
      font-size: 14px;
    }

    .div3 img{
      width: 40px;
      border-radius: 50%;
    }

    .share {
      background-color: #edf2f8;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
    }

    .share-tooltip {
      position: absolute;
      bottom: 160%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #48556a;
      padding: 12px 25px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .share-tooltip span {
      color: #9eafc2;
      letter-spacing: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .share-tooltip img {
      width: 18px;
      cursor: pointer;
    }

    .share-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 8px;
      border-style: solid;
      border-color: #48556a transparent transparent transparent;
    }

    .share-tooltip.active {
      opacity: 1;
      visibility: visible;
    }

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<main class="container">
  <img src="images/drawers.jpg" alt="">

  <div class="parent-div">
      <div class="content">
        <h1>Shift the overall look and feel by adding these wonderful
          touches to furniture in your home</h1>

        <p>Ever been in a room and felt like something was missing? Perhaps
          it felt slightly bare and uninviting. I’ve got some simple tips
          to help you make any room feel complete.</p>

        <footer>
          <div class="div3">
            <img src="images/avatar-michelle.jpg" alt="">
            <div class="author">
              <span class="name">Michelle Appleton</span>
              <span class="date">28 Jun 2020</span>
            </div>
          </div>
          <div class="share" id="shareBtn">
            <img src="images/icon-share.svg" alt="Share Icon">

            <div class="share-tooltip" id="tooltip">
              <span>SHARE</span>
              <img src="images/icon-facebook.svg" alt="Facebook">
              <img src="images/icon-twitter.svg" alt="Twitter">
              <img src="images/icon-pinterest.svg" alt="Pinterest">
            </div>
          </div>
        </footer>
      </div>
  </div>

  </main>

<script>
  const shareBtn = document.getElementById("shareBtn");
  const tooltip = document.getElementById("tooltip");

  shareBtn.addEventListener("click", () => {
    tooltip.classList.toggle("active");
  })
</script>
</body>
</html>
